<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReVox · 片段详情</title>
<style>
/* ============================================================
   ReVox · 声刻 — 片段详情
   设备里嵌了块监视器屏：开盘机机身是实体，视频屏嵌在面板上，
   左右两个大带轮与视频屏平起平坐。下方经典播放条。
   ============================================================ */
:root{
  --font-display:"Bahnschrift","DIN Alternate",ui-sans-serif,sans-serif;
  --font-meter:ui-monospace,"SF Mono","Cascadia Code","Consolas",monospace;
  --font-label:"Helvetica Neue","Segoe UI",system-ui,sans-serif;
  --alu-1:#cfd2d6;--alu-2:#a6abb1;--alu-3:#7f858c;--alu-4:#5c6167;--alu-edge:#3a3d42;
  --amber:#ffb33e;--amber-soft:#ffd27a;--amber-deep:#c9791a;
  --rec:#ff2d2d;--rec-glow:#ff5b4a;
  --paper:#f3e9d2;--paper-2:#e8dabb;
  --led:#ff2d2d;
  --ink:#e9ebed;--ink-dim:#9aa0a6;--ink-faint:#5e646b;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font-label);color:var(--ink);background:#070708;overflow:hidden;-webkit-font-smoothing:antialiased}
.room{position:relative;height:100vh;min-height:660px;display:flex;flex-direction:column;align-items:center;padding:16px 22px 18px;gap:14px;
  background:radial-gradient(80% 60% at 50% 30%,rgba(255,179,62,.04),transparent 60%),repeating-linear-gradient(45deg,#161618 0 16px,#101012 16px 32px),#0a0a0b}
.room::before{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(80% 70% at 50% 42%,transparent 42%,rgba(0,0,0,.7) 100%)}
.room>*{position:relative;z-index:1}

/* 顶部返回条 */
.topnav{width:100%;max-width:1260px;display:flex;align-items:center;gap:16px;flex:0 0 auto}
.back-btn{display:flex;align-items:center;gap:8px;cursor:pointer;font-family:var(--font-display);font-size:12px;letter-spacing:2px;color:var(--ink-dim);
  background:linear-gradient(180deg,#2a2b2e,#161719);padding:8px 14px;border-radius:6px;border:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 2px 5px rgba(0,0,0,.5);transition:all .15s}
.back-btn:hover{color:var(--amber-soft);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 2px 5px rgba(0,0,0,.5),0 0 0 1px rgba(255,179,62,.3)}
.back-btn:active{transform:translateY(1px)}
.clip-title{font-family:var(--font-display);font-size:17px;letter-spacing:1px;color:var(--ink)}
.clip-title .tag{font-family:var(--font-meter);font-size:10px;color:#ffd27a;vertical-align:middle;background:rgba(255,179,62,.15);padding:2px 8px;border-radius:4px;margin-left:10px;border:1px solid rgba(255,179,62,.3);letter-spacing:1px}
.clip-meta{margin-left:auto;font-family:var(--font-meter);font-size:11px;color:var(--ink-faint)}

/* ============================================================
   开盘机机身 —— 拉丝铝实体面板，左右带轮 + 中间嵌视频屏
   ============================================================ */
.machine{
  width:100%;max-width:1260px;flex:1;min-height:0;border-radius:14px;position:relative;
  padding:22px 26px;
  display:grid;grid-template-columns:1fr 2.1fr 1fr;align-items:center;gap:22px;
  background:linear-gradient(180deg,var(--alu-1),var(--alu-2) 14%,var(--alu-3) 86%,var(--alu-4));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.85),inset 0 -2px 4px rgba(0,0,0,.4),0 18px 40px rgba(0,0,0,.7),0 2px 0 rgba(0,0,0,.6)}
.machine::before{content:"";position:absolute;inset:0;border-radius:14px;pointer-events:none;background:repeating-linear-gradient(90deg,rgba(255,255,255,.045) 0 1px,rgba(0,0,0,.035) 1px 2px);mix-blend-mode:overlay}
.machine .scr{position:absolute;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#f1f3f5,#8b9097 55%,#4c5056);box-shadow:inset 0 0 2px rgba(0,0,0,.6),0 1px 1px rgba(255,255,255,.6);z-index:5}
.machine .scr::after{content:"";position:absolute;inset:0;margin:auto;width:8px;height:1.5px;background:rgba(0,0,0,.45);border-radius:1px;transform:rotate(40deg)}
.machine .scr.tl{top:12px;left:12px}.machine .scr.tr{top:12px;right:12px}.machine .scr.bl{bottom:12px;left:12px}.machine .scr.br{bottom:12px;right:12px}

/* 带轮舱（带凹陷座） */
.reel-bay{display:flex;flex-direction:column;align-items:center;gap:10px;justify-self:center}
.reel-seat{position:relative;width:210px;height:210px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle,#9a9fa5,#7c8187 70%,#5c6167);
  box-shadow:inset 0 3px 8px rgba(0,0,0,.45),inset 0 -2px 0 rgba(255,255,255,.4),0 1px 0 rgba(255,255,255,.5)}
.reel{position:relative;width:184px;height:184px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,#16171a 0 12%,#2a2b2e 12% 14%,#0d0e10 14% 79%,#1a1b1e 79% 87%,#050506 87% 100%);
  box-shadow:0 6px 14px rgba(0,0,0,.6),inset 0 2px 4px rgba(255,255,255,.12),inset 0 -4px 8px rgba(0,0,0,.7),0 0 0 1px rgba(0,0,0,.5)}
.reel .tape-roll{position:absolute;inset:18px;border-radius:50%;border:34px solid #2a1c10;box-shadow:inset 0 0 8px rgba(0,0,0,.8);transition:border-width .25s linear}
.reel .tape-roll::after{content:"";position:absolute;inset:-34px;border-radius:50%;background:repeating-radial-gradient(circle,transparent 0 1px,rgba(120,80,40,.25) 1px 2px);-webkit-mask:radial-gradient(circle,transparent 56%,#000 57%)}
.reel .hub{position:absolute;inset:0;margin:auto;width:58px;height:58px;border-radius:50%;z-index:2;background:radial-gradient(circle at 40% 35%,#e8eaec,#a6abb1 50%,#5c6167 90%);box-shadow:0 2px 4px rgba(0,0,0,.6),inset 0 1px 2px rgba(255,255,255,.7),inset 0 -2px 3px rgba(0,0,0,.4)}
.reel .hub::before{content:"";position:absolute;inset:0;margin:auto;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#3a3d42,#0e0f10)}
.reel .spoke{position:absolute;inset:0;z-index:3}
.reel .spoke i{position:absolute;top:50%;left:50%;width:44px;height:7px;margin:-3.5px 0 0 0;background:linear-gradient(90deg,#5c6167,#a6abb1,#5c6167);border-radius:3px;transform-origin:left center;box-shadow:0 1px 2px rgba(0,0,0,.5)}
.reel .spoke i:nth-child(1){transform:rotate(90deg)}.reel .spoke i:nth-child(2){transform:rotate(210deg)}.reel .spoke i:nth-child(3){transform:rotate(330deg)}
.reel-label{font-family:var(--font-meter);font-size:9px;letter-spacing:2px;color:#2a2c30;text-shadow:0 1px 0 rgba(255,255,255,.5)}
/* 带轮下迷你 VU */
.mini-vu{width:150px;border-radius:6px;padding:7px 8px 4px;background:radial-gradient(120% 90% at 50% 120%,rgba(255,179,62,.18),transparent 60%),linear-gradient(180deg,#101113,#050506);box-shadow:inset 0 0 14px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.06),0 1px 0 rgba(255,255,255,.4);position:relative;overflow:hidden}
.mini-vu svg{display:block;width:100%;height:46px;overflow:visible}
.mvfa{fill:none;stroke:rgba(255,210,122,.3);stroke-width:1.2}
.mvt{stroke:var(--amber-soft);stroke-width:1.2}.mvt.red{stroke:var(--rec)}
.mvneedle line{stroke:var(--amber);stroke-width:1.6;filter:drop-shadow(0 0 2px rgba(255,179,62,.9))}
.mvneedle{transition:transform .1s cubic-bezier(.34,1.56,.64,1)}
.mvpivot{fill:#1a1208;stroke:var(--amber-deep);stroke-width:.8}
.mini-vu .lbl{position:absolute;top:5px;left:0;right:0;text-align:center;font-family:var(--font-display);font-size:7px;letter-spacing:2px;color:rgba(255,210,122,.5);z-index:1}
.mini-vu .db{text-align:center;font-family:var(--font-meter);font-size:9px;color:var(--amber);text-shadow:0 0 5px rgba(255,179,62,.5);position:relative;z-index:1}

/* ============================================================
   中间：嵌在面板上的视频监视器屏
   ============================================================ */
.monitor-col{display:flex;flex-direction:column;gap:12px;height:100%;justify-content:center;min-width:0}
/* 监视器屏：嵌进金属面板的凹陷感（深内阴影 + 黑边框） */
.video-frame{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:16/9;width:100%;background:#000;
  box-shadow:0 0 0 4px #141517,0 0 0 5px var(--alu-edge),inset 0 0 0 1px rgba(0,0,0,.8),
    0 0 0 9px #888d93,0 0 0 10px #6a6f75,
    /* 嵌入凹陷的外圈阴影 */
    0 0 30px rgba(0,0,0,.6) inset,0 14px 30px rgba(0,0,0,.6)}
.game{position:absolute;inset:0;overflow:hidden}
.game .scene{position:absolute;inset:0;background:radial-gradient(60% 80% at 30% 40%,#3a4250,transparent 55%),radial-gradient(50% 70% at 78% 65%,#2b3340,transparent 50%),linear-gradient(165deg,#1a2028 0%,#10151c 55%,#0a0e13 100%)}
.game .floor{position:absolute;left:0;right:0;bottom:0;height:42%;background:repeating-linear-gradient(90deg,transparent 0 38px,rgba(255,255,255,.025) 38px 39px),linear-gradient(180deg,transparent,rgba(0,0,0,.5));transform:perspective(300px) rotateX(52deg);transform-origin:bottom;opacity:.7}
.game .doorlight{position:absolute;left:62%;top:24%;width:80px;height:180px;border-radius:6px;background:linear-gradient(180deg,rgba(255,200,120,.35),rgba(255,160,80,.08));filter:blur(8px)}
.game .pillar{position:absolute;top:10%;bottom:18%;width:54px;background:linear-gradient(90deg,#222933,#161b22,#0e1219);box-shadow:4px 0 18px rgba(0,0,0,.6)}
.game .pillar.l{left:14%}.game .pillar.r{right:20%;width:40px}
.game .smoke{position:absolute;left:40%;top:35%;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(180,190,200,.18),transparent 65%);filter:blur(6px);animation:smoke 8s ease-in-out infinite}
@keyframes smoke{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-10px) scale(1.15)}}
.hud{position:absolute;inset:0;z-index:2;pointer-events:none;font-family:var(--font-meter)}
.hud .crosshair{position:absolute;left:50%;top:48%;width:16px;height:16px;transform:translate(-50%,-50%)}
.hud .crosshair::before,.hud .crosshair::after{content:"";position:absolute;background:rgba(255,255,255,.7);box-shadow:0 0 3px rgba(0,0,0,.8)}
.hud .crosshair::before{left:50%;top:0;bottom:0;width:1.5px;margin-left:-.75px}
.hud .crosshair::after{top:50%;left:0;right:0;height:1.5px;margin-top:-.75px}
.hud .hp{position:absolute;left:18px;bottom:16px;color:#dfe4e8;font-size:12px;letter-spacing:1px}
.hud .hp b{color:#8fe89e;font-size:18px}
.hud .ammo{position:absolute;right:18px;bottom:16px;color:#dfe4e8;font-size:12px;text-align:right}
.hud .ammo b{font-size:20px;color:#fff}
.hud .killfeed{position:absolute;right:14px;top:12px;text-align:right;font-size:10px;color:#cfd4d8;line-height:1.7}
.hud .killfeed .k b{color:var(--amber-soft)}
.hud .killfeed .k .x{color:var(--rec-glow);margin:0 5px}
.hud .ops{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);display:flex;gap:5px}
.hud .ops i{width:20px;height:20px;border-radius:3px;background:rgba(20,24,30,.7);border:1px solid rgba(255,255,255,.15);box-shadow:0 0 6px rgba(0,0,0,.5)}
.hud .ops i.down{background:rgba(60,20,20,.6);border-color:rgba(255,45,45,.4)}
.hud .roundtime{position:absolute;left:50%;top:10px;transform:translateX(-50%);color:#fff;font-size:13px;letter-spacing:1px;text-shadow:0 0 4px rgba(0,0,0,.8)}
.rec-watermark{position:absolute;left:14px;top:12px;z-index:3;display:flex;align-items:center;gap:6px;font-family:var(--font-meter);font-size:9px;letter-spacing:2px;color:rgba(255,90,80,.9)}
.rec-watermark .d{width:7px;height:7px;border-radius:50%;background:var(--rec);box-shadow:0 0 8px var(--rec);animation:rb 1.4s infinite}
@keyframes rb{50%{opacity:.3}}
.video-frame .scanlines{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:.12;background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.6) 2px 3px)}
.video-frame .vignette{position:absolute;inset:0;z-index:4;pointer-events:none;background:radial-gradient(70% 70% at 50% 50%,transparent 55%,rgba(0,0,0,.5))}
.big-play{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(0,0,0,.35);transition:opacity .25s}
.big-play.hidden{opacity:0;pointer-events:none}
.big-play .circle{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 38%,rgba(255,179,62,.95),rgba(201,121,26,.9));box-shadow:0 6px 18px rgba(0,0,0,.6),inset 0 2px 4px rgba(255,255,255,.4),0 0 24px rgba(255,179,62,.5);font-size:28px;color:#1a1208;padding-left:6px;transition:transform .15s}
.big-play:hover .circle{transform:scale(1.08)}

/* ============================================================
   经典播放条（最干净：进度 + 时间）
   ============================================================ */
.playbar{display:flex;align-items:center;gap:14px;flex:0 0 auto}
.tc-cur{font-family:var(--font-meter);font-size:12px;color:#1a1c1f;background:linear-gradient(180deg,#caced3,#9a9fa5);padding:3px 8px;border-radius:4px;box-shadow:inset 0 1px 2px rgba(0,0,0,.3),inset 0 -1px 0 rgba(255,255,255,.4);min-width:48px;text-align:center}
.tc-cur.dur{color:#42454a}
.track{flex:1;position:relative;height:8px;border-radius:5px;cursor:pointer;
  background:linear-gradient(180deg,#1a1b1d,#0a0a0b);box-shadow:inset 0 1px 3px rgba(0,0,0,.8),inset 0 -1px 0 rgba(255,255,255,.1),0 1px 0 rgba(255,255,255,.4)}
.track .buffered{position:absolute;left:0;top:0;bottom:0;border-radius:5px;background:rgba(255,255,255,.08);width:100%}
.track .fill{position:absolute;left:0;top:0;bottom:0;border-radius:5px;background:linear-gradient(90deg,var(--amber-deep),var(--amber));box-shadow:0 0 8px rgba(255,179,62,.5);width:0}
/* 高光段在播放条上的小标记 */
.track .hot{position:absolute;top:-2px;bottom:-2px;background:rgba(255,45,45,.18);border-left:1px solid rgba(255,45,45,.5);border-right:1px solid rgba(255,45,45,.5);border-radius:1px;z-index:1}
.track .scrub{position:absolute;top:50%;width:16px;height:16px;border-radius:50%;margin:-8px 0 0 -8px;left:0;z-index:3;
  background:radial-gradient(circle at 40% 35%,#fff,#cfd2d6 50%,#8b9097);box-shadow:0 2px 5px rgba(0,0,0,.6),0 0 0 3px rgba(255,179,62,.0);transition:box-shadow .15s}
.track:hover .scrub{box-shadow:0 2px 5px rgba(0,0,0,.6),0 0 0 4px rgba(255,179,62,.25)}
/* 用户标记 */
.track .umark{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--rec);z-index:2;box-shadow:0 0 6px var(--rec)}
.track .umark::before{content:"";position:absolute;top:-2px;left:-3px;width:8px;height:8px;border-radius:50%;background:var(--rec);box-shadow:0 0 6px var(--rec)}

/* ============================================================
   底部控制台：传输按钮 + 速度 + LED时间码 + 打字机纸条
   ============================================================ */
.deck-bar{width:100%;max-width:1260px;flex:0 0 auto;display:grid;grid-template-columns:1fr 360px;gap:16px}
.transport-panel{border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:18px;background:linear-gradient(180deg,var(--alu-2),var(--alu-4));box-shadow:inset 0 1px 0 rgba(255,255,255,.7),inset 0 -2px 4px rgba(0,0,0,.4),0 6px 14px rgba(0,0,0,.5);position:relative}
.transport-panel::before{content:"";position:absolute;inset:0;border-radius:10px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 1px,rgba(0,0,0,.03) 1px 2px);mix-blend-mode:overlay;pointer-events:none}
.pbtns{display:flex;gap:12px}
.pbtn{position:relative;width:52px;height:52px;border:none;cursor:pointer;border-radius:9px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#3a3d42,#1a1b1e);box-shadow:0 4px 0 #0c0d0f,0 6px 9px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.15);transition:all .08s;color:#cfd2d6}
.pbtn .cap{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.02));box-shadow:inset 0 1px 1px rgba(255,255,255,.3),inset 0 -2px 4px rgba(0,0,0,.4)}
.pbtn.play .cap{color:#8fe89e;text-shadow:0 0 8px rgba(143,232,158,.6)}
.pbtn.mark .cap{color:var(--rec-glow);text-shadow:0 0 8px rgba(255,91,74,.6)}
.pbtn.skip .cap{color:#cfd2d6;font-size:13px}
.pbtn:hover{filter:brightness(1.12)}
.pbtn:active,.pbtn.pressed{transform:translateY(3px);box-shadow:0 1px 0 #0c0d0f,0 2px 4px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1)}
.pbtn-lbl{position:absolute;bottom:-14px;left:0;right:0;text-align:center;font-family:var(--font-meter);font-size:7px;letter-spacing:1px;color:#2a2c30}
.speed{display:flex;gap:5px}
.speed button{font-family:var(--font-meter);font-size:10px;color:#2a2c30;cursor:pointer;border:none;border-radius:4px;padding:5px 7px;background:linear-gradient(180deg,#caced3,#9a9fa5);box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 1px 2px rgba(0,0,0,.3)}
.speed button.on{background:linear-gradient(180deg,var(--amber-soft),var(--amber-deep));color:#1a1208}
.speed button:active{transform:translateY(1px)}
.timecode{display:flex;align-items:center;gap:2px;background:linear-gradient(180deg,#1a0606,#0a0202);border-radius:6px;padding:7px 12px;margin-left:auto;box-shadow:inset 0 0 14px rgba(0,0,0,.9),0 1px 0 rgba(255,255,255,.5)}
.seg{font-family:var(--font-meter);font-weight:700;font-size:26px;letter-spacing:1px;color:var(--led);text-shadow:0 0 8px rgba(255,45,45,.9),0 0 16px rgba(255,45,45,.5)}
.seg.dim{color:#3a1010;text-shadow:none}
.seg.colon{font-size:22px;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:.25}}
.tc-unit{font-family:var(--font-meter);font-size:9px;color:#7a2020;align-self:flex-end;margin:0 0 5px 5px}
.paper-slot{border-radius:10px;position:relative;overflow:hidden;display:flex;flex-direction:column;background:linear-gradient(180deg,#1a1b1e,#0e0f11);box-shadow:inset 0 0 0 1px rgba(0,0,0,.5),0 4px 10px rgba(0,0,0,.4)}
.paper-slot::before{content:"";position:absolute;top:0;left:0;right:0;height:12px;z-index:3;background:linear-gradient(180deg,#a6abb1,#5c6167);box-shadow:0 2px 6px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.6)}
.paper-slot .slot-line{position:absolute;top:10px;left:0;right:0;height:2px;background:#000;z-index:4}
.paper{margin:18px 12px 12px;flex:1;border-radius:3px;padding:11px 14px;overflow:hidden;background:repeating-linear-gradient(0deg,transparent 0 20px,rgba(160,130,80,.12) 20px 21px),linear-gradient(180deg,var(--paper),var(--paper-2));box-shadow:0 2px 8px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.5);color:#4a3818;font-family:var(--font-meter);font-size:11px;line-height:1.7;position:relative}
.paper .ph{font-family:var(--font-display);font-size:9px;letter-spacing:2px;color:#8a6a2a;border-bottom:1px solid rgba(120,90,40,.3);padding-bottom:5px;margin-bottom:6px}
.paper .typed{white-space:pre-wrap;min-height:64px}
.paper .stamp{position:absolute;right:12px;bottom:8px;font-family:var(--font-display);font-size:8px;letter-spacing:1px;color:rgba(180,60,40,.6);border:1.5px solid rgba(180,60,40,.5);border-radius:3px;padding:2px 6px;transform:rotate(-7deg)}
@media (max-width:1300px){.machine{grid-template-columns:1fr 1.9fr 1fr;gap:16px}.reel-seat{width:178px;height:178px}.reel{width:156px;height:156px}.mini-vu{width:130px}}
@media (max-height:780px){.reel-seat{width:172px;height:172px}.reel{width:150px;height:150px}}
</style>
</head>
<body>

<div class="room">

  <div class="topnav">
    <button class="back-btn" id="backBtn">‹ 返回录音室</button>
    <div class="clip-title">Clubhouse · 三杀残局翻盘 <span class="tag">ACE</span></div>
    <div class="clip-meta">今天 14:00 · 0:18 · 1080p60</div>
  </div>

  <!-- 开盘机机身：左带轮 — 视频屏 — 右带轮 -->
  <div class="machine">
    <span class="scr tl"></span><span class="scr tr"></span><span class="scr bl"></span><span class="scr br"></span>

    <!-- 左带轮 -->
    <div class="reel-bay">
      <div class="reel-seat">
        <div class="reel" id="reelL">
          <div class="tape-roll" id="rollL" style="border-width:42px"></div>
          <div class="spoke"><i></i><i></i><i></i></div>
          <div class="hub"></div>
        </div>
      </div>
      <div class="reel-label">SUPPLY</div>
      <div class="mini-vu">
        <div class="lbl">L</div>
        <svg viewBox="0 0 150 46" preserveAspectRatio="xMidYMax meet">
          <path class="mvfa" d="M 22 42 A 53 53 0 0 1 128 42"/>
          <g id="mvTicksL"></g>
          <g class="mvneedle" id="mvNeedleL" transform="translate(75 42) rotate(-50)"><line x1="0" y1="0" x2="0" y2="-34"/></g>
          <circle class="mvpivot" cx="75" cy="42" r="3.5"/>
        </svg>
        <div class="db" id="mvDbL">-12 dB</div>
      </div>
    </div>

    <!-- 中：视频监视器屏 + 经典播放条 -->
    <div class="monitor-col">
      <div class="video-frame">
        <div class="game" id="game">
          <div class="scene"></div>
          <div class="pillar l"></div><div class="pillar r"></div>
          <div class="doorlight"></div><div class="smoke"></div><div class="floor"></div>
        </div>
        <div class="hud">
          <div class="roundtime" id="roundTime">2:41</div>
          <div class="crosshair"></div>
          <div class="killfeed" id="killfeed"></div>
          <div class="hp">HP <b>87</b></div>
          <div class="ammo">R4-C<br><b id="ammo">28</b> / 90</div>
          <div class="ops"><i></i><i></i><i class="down"></i><i></i><i></i></div>
        </div>
        <div class="rec-watermark"><span class="d"></span>● REC · ReVox</div>
        <div class="scanlines"></div>
        <div class="vignette"></div>
        <div class="big-play" id="bigPlay"><div class="circle">▶</div></div>
      </div>

      <!-- 经典播放条 -->
      <div class="playbar">
        <div class="tc-cur" id="curTime">0:00</div>
        <div class="track" id="track">
          <div class="buffered"></div>
          <div class="hot" id="hotSeg" style="left:55%;width:17%"></div>
          <div class="umark" id="uMark" style="display:none"></div>
          <div class="fill" id="fill"></div>
          <div class="scrub" id="scrub"></div>
        </div>
        <div class="tc-cur dur">0:18</div>
      </div>
    </div>

    <!-- 右带轮 -->
    <div class="reel-bay">
      <div class="reel-seat">
        <div class="reel" id="reelR">
          <div class="tape-roll" id="rollR" style="border-width:18px"></div>
          <div class="spoke"><i></i><i></i><i></i></div>
          <div class="hub"></div>
        </div>
      </div>
      <div class="reel-label">TAKE-UP</div>
      <div class="mini-vu">
        <div class="lbl">R</div>
        <svg viewBox="0 0 150 46" preserveAspectRatio="xMidYMax meet">
          <path class="mvfa" d="M 22 42 A 53 53 0 0 1 128 42"/>
          <g id="mvTicksR"></g>
          <g class="mvneedle" id="mvNeedleR" transform="translate(75 42) rotate(-50)"><line x1="0" y1="0" x2="0" y2="-34"/></g>
          <circle class="mvpivot" cx="75" cy="42" r="3.5"/>
        </svg>
        <div class="db" id="mvDbR">-12 dB</div>
      </div>
    </div>
  </div>

  <!-- 底部控制台 -->
  <div class="deck-bar">
    <div class="transport-panel">
      <div class="pbtns">
        <button class="pbtn skip" id="backStep"><span class="cap">⏮</span><span class="pbtn-lbl">-5s</span></button>
        <button class="pbtn play" id="playBtn"><span class="cap" id="playIcon">▶</span><span class="pbtn-lbl">PLAY</span></button>
        <button class="pbtn skip" id="fwdStep"><span class="cap">⏭</span><span class="pbtn-lbl">+5s</span></button>
        <button class="pbtn mark" id="markBtn"><span class="cap">⚲</span><span class="pbtn-lbl">MARK</span></button>
      </div>
      <div class="speed">
        <button data-spd="0.5">0.5×</button>
        <button data-spd="1" class="on">1×</button>
        <button data-spd="2">2×</button>
      </div>
      <div class="timecode" id="timecode">
        <span class="seg dim">0</span><span class="seg">0</span>
        <span class="seg colon">:</span>
        <span class="seg">0</span><span class="seg">0</span>
        <span class="tc-unit">/ 00:18</span>
      </div>
    </div>

    <div class="paper-slot">
      <div class="slot-line"></div>
      <div class="paper">
        <div class="ph">◆ AI 自动总结 · TRANSCRIPT</div>
        <div class="typed" id="typed"></div>
        <div class="stamp">ReVox AI</div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  const $=(s)=>document.querySelector(s);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const lerp=(a,b,t)=>a+(b-a)*t;
  const fmt=(s)=>Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');

  const DURATION=18;
  let t=0, playing=false, speed=1, lastFrame=null;
  let levelL=0.3, levelR=0.3, reelAngle=0;

  /* 双迷你 VU 刻度 */
  function buildMiniVU(gid){
    const g=document.getElementById(gid), cx=75, cy=42;
    [{a:-50},{a:-28},{a:-6},{a:16},{a:38,red:1},{a:50,red:1}].forEach(m=>{
      const rad=(m.a-90)*Math.PI/180;
      const x1=cx+Math.cos(rad)*47,y1=cy+Math.sin(rad)*47,x2=cx+Math.cos(rad)*52,y2=cy+Math.sin(rad)*52;
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
      l.setAttribute('class','mvt'+(m.red?' red':''));g.appendChild(l);
    });
  }
  buildMiniVU('mvTicksL'); buildMiniVU('mvTicksR');
  const mvNeedleL=$('#mvNeedleL'),mvNeedleR=$('#mvNeedleR'),mvDbL=$('#mvDbL'),mvDbR=$('#mvDbR');

  /* 模拟语音强度（含高光爆发段） */
  function levelAt(time){
    const p=time/DURATION;
    const env=Math.sin(p*Math.PI)*0.55+0.45;
    const burst=(p>0.55&&p<0.72)?1.7:1;
    const a=(Math.sin(time*4)*0.5+Math.sin(time*1.3)*0.3+Math.sin(time*8)*0.2);
    return clamp(Math.abs(a)*env*burst*0.8,0,1);
  }

  const fill=$('#fill'),scrub=$('#scrub'),curTime=$('#curTime'),uMark=$('#uMark');
  const reelL=$('#reelL'),reelR=$('#reelR'),rollL=$('#rollL'),rollR=$('#rollR');
  const playBtn=$('#playBtn'),playIcon=$('#playIcon'),bigPlay=$('#bigPlay');
  const markBtn=$('#markBtn'),tc=$('#timecode');
  const segs=[...tc.querySelectorAll('.seg')].filter(s=>!s.classList.contains('colon'));
  const ammo=$('#ammo'),killfeed=$('#killfeed'),roundTime=$('#roundTime');

  const KILLS=[{at:4,n:'Smoke'},{at:8,n:'Mute'},{at:11,n:'Bandit'},{at:15,n:'Kapkan'}];
  let shownKills=-1;
  function updateGame(){
    const prog=t/DURATION;
    ammo.textContent=Math.max(0,Math.round(lerp(28,6,prog)));
    const rt=Math.max(0,161-Math.floor(t*1.5));
    roundTime.textContent=Math.floor(rt/60)+':'+String(rt%60).padStart(2,'0');
    const due=KILLS.filter(k=>t>=k.at).length;
    if(due!==shownKills){shownKills=due;
      killfeed.innerHTML=KILLS.slice(0,due).slice(-4).map(k=>`<div class="k"><b>你</b><span class="x">×</span>${k.n}</div>`).join('');}
    const burst=(prog>0.55&&prog<0.72)?1:0;
    const shake=playing?(Math.sin(t*40)*(0.6+burst*1.4)):0;
    $('#game').style.transform=`translate(${shake.toFixed(2)}px,${(shake*0.5).toFixed(2)}px) scale(1.0${burst?2:0})`;
  }

  function render(){
    const prog=t/DURATION;
    fill.style.width=(prog*100)+'%';
    scrub.style.left=(prog*100)+'%';
    curTime.textContent=fmt(t);
    rollL.style.borderWidth=lerp(42,18,prog)+'px';
    rollR.style.borderWidth=lerp(18,42,prog)+'px';
    reelL.style.transform='rotate('+reelAngle+'deg)';
    reelR.style.transform='rotate('+reelAngle+'deg)';
    const cur=Math.floor(t),str=String(Math.floor(cur/60)).padStart(2,'0')+String(cur%60).padStart(2,'0');
    segs.forEach((s,i)=>{s.textContent=str[i];s.classList.toggle('dim',str[i]==='0'&&i===0)});
    const tgtL=playing?clamp(levelAt(t)+Math.random()*0.1,0,1):0.12;
    const tgtR=playing?clamp(levelAt(Math.max(0,t-0.25))+Math.random()*0.1,0,1):0.12;
    levelL=lerp(levelL,tgtL,0.25);levelR=lerp(levelR,tgtR,0.25);
    mvNeedleL.setAttribute('transform','translate(75 42) rotate('+lerp(-50,50,levelL)+')');
    mvNeedleR.setAttribute('transform','translate(75 42) rotate('+lerp(-50,50,levelR)+')');
    const dbL=Math.round(lerp(-20,3,levelL)),dbR=Math.round(lerp(-20,3,levelR));
    mvDbL.textContent=(dbL>=0?'+':'')+dbL+' dB';mvDbR.textContent=(dbR>=0?'+':'')+dbR+' dB';
    mvDbL.style.color=dbL>=0?'var(--rec-glow)':'var(--amber)';
    mvDbR.style.color=dbR>=0?'var(--rec-glow)':'var(--amber)';
    updateGame();
  }

  function frame(ts){
    if(!lastFrame)lastFrame=ts;
    const dt=(ts-lastFrame)/1000;lastFrame=ts;
    if(playing){t+=dt*speed;reelAngle+=dt*200*speed;if(t>=DURATION){t=DURATION;pause();}}
    render();requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  function play(){if(t>=DURATION)t=0;playing=true;playIcon.textContent='⏸';bigPlay.classList.add('hidden');}
  function pause(){playing=false;playIcon.textContent='▶';bigPlay.classList.remove('hidden');}
  function toggle(){playing?pause():play();}
  playBtn.addEventListener('click',()=>{playBtn.classList.add('pressed');setTimeout(()=>playBtn.classList.remove('pressed'),120);toggle();});
  bigPlay.addEventListener('click',play);
  $('#backStep').addEventListener('click',function(){this.classList.add('pressed');setTimeout(()=>this.classList.remove('pressed'),120);t=clamp(t-5,0,DURATION);render();});
  $('#fwdStep').addEventListener('click',function(){this.classList.add('pressed');setTimeout(()=>this.classList.remove('pressed'),120);t=clamp(t+5,0,DURATION);render();});

  document.querySelectorAll('.speed button').forEach(b=>{
    b.addEventListener('click',()=>{document.querySelectorAll('.speed button').forEach(x=>x.classList.remove('on'));b.classList.add('on');speed=parseFloat(b.dataset.spd);});
  });

  /* 播放条点击/拖拽跳转 */
  const track=$('#track');
  function seek(clientX){const r=track.getBoundingClientRect();t=clamp((clientX-r.left)/r.width,0,1)*DURATION;render();}
  let seeking=false;
  track.addEventListener('mousedown',e=>{seeking=true;seek(e.clientX);});
  window.addEventListener('mousemove',e=>{if(seeking)seek(e.clientX);});
  window.addEventListener('mouseup',()=>seeking=false);

  markBtn.addEventListener('click',()=>{
    markBtn.classList.add('pressed');setTimeout(()=>markBtn.classList.remove('pressed'),140);
    uMark.style.left=(t/DURATION*100)+'%';uMark.style.display='block';
    tc.style.boxShadow='inset 0 0 14px rgba(0,0,0,.9),0 0 14px rgba(255,45,45,.6)';
    setTimeout(()=>{tc.style.transition='box-shadow .5s';tc.style.boxShadow='';setTimeout(()=>tc.style.transition='',500);},80);
  });

  $('#typed').textContent=
    "[00:03] 队友报点 B 楼梯有脚步声\n"+
    "[00:07] 预瞄架枪，第一枪命中头部\n"+
    "[00:11] 三杀达成，语音\"干掉了\"\n"+
    "[00:15] 残局 1v1 绕后包夹 ACE\n"+
    "—— 高光强度评级：S 级";

  $('#backBtn').addEventListener('click',()=>{
    const m=document.querySelector('.machine');
    m.style.transition='transform .3s,opacity .3s';m.style.transform='scale(.98)';m.style.opacity='.4';
    setTimeout(()=>{m.style.transform='';m.style.opacity='';},320);
  });

  render();
})();
</script>
</body>
</html>
